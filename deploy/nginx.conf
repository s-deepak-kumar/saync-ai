# Production nginx config for Saync.
# Identical to what DEPLOY.md installs on the VSI.

server {
  listen 80 default_server;
  server_name _;

  # Backend API + SSE
  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE — disable buffering so live events flow immediately.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
  }

  # Backend health (un-prefixed for convenience)
  location = /health {
    proxy_pass http://127.0.0.1:4000/health;
  }

  # Everything else → Next.js dashboard
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
